<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4B7FD4" /><stop offset="1" stop-color="#7B6FD4" />
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#4B7FD4" /><stop offset="1" stop-color="#7B6FD4" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#EDEAE4" />
  <circle cx="120" cy="110" r="220" fill="#4AA8D8" opacity="0.10" />
  <circle cx="1080" cy="540" r="240" fill="#A78BFA" opacity="0.10" />

  <!-- Floating emoji accents -->
  <text x="150" y="170" font-size="66" opacity="0.22">☕</text>
  <text x="980" y="150" font-size="60" opacity="0.22">🏐</text>
  <text x="170" y="520" font-size="60" opacity="0.22">🌅</text>
  <text x="1000" y="500" font-size="58" opacity="0.22">🍽️</text>

  <!-- Logo mark -->
  <g transform="translate(600,205)">
    <circle cx="-28" cy="0" r="52" fill="url(#mark)" opacity="0.9" />
    <circle cx="28" cy="0" r="52" fill="url(#mark)" opacity="0.6" />
    <path d="M0 -30 V30 M-30 0 H30" stroke="#fff" stroke-width="12" stroke-linecap="round" />
  </g>

  <!-- Wordmark -->
  <text x="600" y="400" text-anchor="middle" font-family="'Raleway','Segoe UI',sans-serif" font-weight="800" font-size="132" fill="url(#word)" letter-spacing="-3">Dolo</text>

  <!-- Tagline / invite -->
  <text x="600" y="470" text-anchor="middle" font-family="'Nunito','Segoe UI',sans-serif" font-style="italic" font-weight="700" font-size="40" fill="#7B6FD4">Don't go dolo.</text>
  <text x="600" y="535" text-anchor="middle" font-family="'Nunito','Segoe UI',sans-serif" font-weight="700" font-size="34" fill="#4A4A4A">You're invited to tag along 🎉</text>
</svg>
