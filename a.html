  <style>
    :root {
      --cream: #EDEAE4;
      --white: #FFFFFF;
      --blue: #4B7FD4;
      --purple: #7B6FD4;
      --ink: #1A1A1A;
      --mid: #4A4A4A;
      --soft: #8A8A8A;
      --border: #E8E4DE;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }
    /* Floating background bubbles — matches the app + main site */
    .bg-fx { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .glow { position: absolute; border-radius: 50%; filter: blur(8px); }
    .glow-1 { top: -120px; left: -120px; width: 320px; height: 320px; background: #4AA8D8; opacity: 0.10; }
    .glow-2 { bottom: -90px; right: -90px; width: 300px; height: 300px; background: #A78BFA; opacity: 0.10; }
    .bubble { position: absolute; opacity: 0.16; animation: float 5s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-14px);} }
    @media (prefers-reduced-motion: reduce) { .bubble { animation: none; } }

    .card {
      position: relative;
      z-index: 1;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 40px 32px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 18px 50px rgba(74, 48, 32, 0.12);
    }
    .logo-mark { display: block; margin: 0 auto 18px; }
    .wordmark {
      font-family: 'Raleway', sans-serif;
      font-weight: 800;
      font-size: 40px;
      background: linear-gradient(100deg, var(--blue), var(--purple));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    .tagline {
      font-style: italic; font-weight: 600; color: var(--purple);
      font-size: 15px; margin-top: 2px; margin-bottom: 22px;
    }
    h1 { font-family: 'Raleway', sans-serif; font-weight: 800; font-size: 24px; line-height: 1.25; margin-bottom: 10px; }
    .sub { color: var(--mid); font-size: 16px; margin-bottom: 26px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%;
      font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 17px;
      padding: 16px 24px; border-radius: 100px; border: none; cursor: pointer;
      background: linear-gradient(100deg, var(--blue), var(--purple));
      color: #fff; box-shadow: 0 8px 22px rgba(75, 127, 212, 0.35);
      transition: transform 0.15s ease; text-decoration: none;
    }
    .btn:hover { transform: translateY(-2px); text-decoration: none; }
    .note { margin-top: 18px; color: var(--soft); font-size: 14px; }
    .note a { color: var(--blue); font-weight: 700; }
    .foot { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div class="bg-fx" aria-hidden="true">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <span class="bubble" style="top:12%; left:8%;  font-size:32px; animation-delay:0s;">☕</span>
    <span class="bubble" style="top:16%; right:10%;font-size:28px; animation-delay:0.7s;">🏐</span>
    <span class="bubble" style="bottom:14%;left:10%; font-size:28px; animation-delay:1.1s;">🌅</span>
    <span class="bubble" style="bottom:18%;right:9%; font-size:26px; animation-delay:0.4s;">🍽️</span>
  </div>

  <div class="card">
    <svg class="logo-mark" width="76" height="76" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Dolo logo">
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
          <stop stop-color="#4B7FD4" /><stop offset="1" stop-color="#7B6FD4" />
        </linearGradient>
      </defs>
      <circle cx="22" cy="30" r="14" fill="url(#lg)" opacity="0.9" />
      <circle cx="38" cy="30" r="14" fill="url(#lg)" opacity="0.6" />
      <path d="M30 22 V38 M22 30 H38" stroke="#fff" stroke-width="3.4" stroke-linecap="round" />
    </svg>
    <div class="wordmark">Dolo</div>
    <div class="tagline">Don't go dolo.</div>

    <h1>You're invited to tag along 🎉</h1>
    <p class="sub">Open this activity in the Dolo app to see the details and join in.</p>

    <a id="open-btn" class="btn" href="#">Open in Dolo</a>

    <p class="note" id="fallback-note">
      Don't have the app yet? <a href="https://dontgodolo.com">Coming soon to the App Store.</a>
    </p>
  </div>

  <script>
    // ---- Config (update these when the app goes live) ----
    var APP_SCHEME = 'vibecode';            // app's URL scheme (from app.json)
    var APP_STORE_URL = '';                 // paste the App Store link here when live
    // ------------------------------------------------------

    var params = new URLSearchParams(window.location.search);
    var id = params.get('id') || '';
    var token = params.get('t') || '';

    // Build the deep link that opens the activity inside the app.
    var deepLink = APP_SCHEME + '://activity/' + encodeURIComponent(id);
    if (token) deepLink += '?t=' + encodeURIComponent(token);

    var btn = document.getElementById('open-btn');
    var note = document.getElementById('fallback-note');

    function openApp() {
      // Try to hand off to the app.
      window.location.href = deepLink;
      // If nothing took over after a moment, the app probably isn't installed.
      setTimeout(function () {
        if (APP_STORE_URL) {
          window.location.href = APP_STORE_URL;
        } else {
          note.innerHTML = "Looks like the Dolo app isn't installed yet — it's <strong>coming soon to the App Store</strong>.";
        }
      }, 1400);
    }

    btn.addEventListener('click', function (e) {
      e.preventDefault();
      openApp();
    });

    // On phones, try opening the app automatically on arrival.
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent) && id) {
      openApp();
    }
  </script>
</body>
</html>
